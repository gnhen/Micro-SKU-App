name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Set up Node and install your Expo packages
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        
    - name: Install dependencies
      working-directory: ./MicroScraper
      run: npm install

    # 2. Generate the missing android/ directory
    - name: Expo Prebuild
      working-directory: ./MicroScraper
      run: npx expo prebuild --platform android

    # 3. Standard Android build steps (Switched to Java 17 for Expo compatibility)
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      working-directory: ./MicroScraper/android
      run: chmod +x gradlew
      
    - name: Build with Gradle
      working-directory: ./MicroScraper/android
      run: ./gradlew build
